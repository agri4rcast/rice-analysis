<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>수확기 산지쌀값 분석</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --green:   #2d6a4f;
      --green2:  #40916c;
      --green3:  #74c69d;
      --cream:   #f8f4ec;
      --sand:    #e9dcc9;
      --brown:   #6b4f3a;
      --red:     #c1121f;
      --up:      #2d6a4f;
      --down:    #c1121f;
      --text:    #1a1a1a;
      --muted:   #6b7280;
      --card:    #ffffff;
      --border:  #e2d9cc;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      background: var(--green);
      color: white;
      padding: 28px 20px 24px;
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '🌾';
      position: absolute;
      right: -10px;
      top: -10px;
      font-size: 120px;
      opacity: 0.08;
      transform: rotate(15deg);
    }
    header h1 { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; line-height: 1.3; }
    header p { margin-top: 6px; font-size: 13px; opacity: 0.75; font-weight: 300; }
    main { max-width: 680px; margin: 0 auto; padding: 20px 16px 60px; }
    .btn-wrap { margin: 24px 0 20px; }
    #btnAnalyze {
      width: 100%; padding: 18px; background: var(--green); color: white;
      border: none; border-radius: 14px; font-family: 'Noto Sans KR', sans-serif;
      font-size: 17px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: background 0.2s, transform 0.1s;
      box-shadow: 0 4px 16px rgba(45,106,79,0.25);
    }
    #btnAnalyze:hover  { background: var(--green2); }
    #btnAnalyze:active { transform: scale(0.98); }
    #btnAnalyze:disabled { background: #9ca3af; cursor: not-allowed; box-shadow: none; }
    #status { text-align: center; font-size: 13px; color: var(--muted); margin-bottom: 16px; min-height: 18px; }
    .section-title {
      font-size: 13px; font-weight: 700; color: var(--green);
      text-transform: uppercase; letter-spacing: 1.2px;
      margin: 28px 0 10px; padding-bottom: 6px; border-bottom: 2px solid var(--green3);
    }
    .card {
      background: var(--card); border-radius: 14px; border: 1px solid var(--border);
      overflow: hidden; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .year-table { width: 100%; border-collapse: collapse; }
    .year-table th {
      background: var(--green); color: white; font-size: 12px;
      font-weight: 600; padding: 10px 12px; text-align: center;
    }
    .year-table td {
      padding: 12px; text-align: center;
      border-bottom: 1px solid var(--border); font-size: 14px;
    }
    .year-table tr:last-child td { border-bottom: none; }
    .year-table tr:nth-child(even) td { background: #fafaf8; }
    .year-table .year-col { font-weight: 700; color: var(--green); font-family: 'DM Mono', monospace; }
    .year-table .price-col { font-family: 'DM Mono', monospace; font-weight: 500; }
    .year-table .highlight-row td { background: #f0faf4 !important; font-weight: 700; }
    .compare-card {
      background: var(--card); border-radius: 14px; border: 1px solid var(--border);
      padding: 18px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .compare-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.8px; }
    .compare-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .compare-row:last-child { border-bottom: none; }
    .compare-key { font-size: 13px; color: var(--muted); }
    .compare-val { font-size: 15px; font-weight: 700; font-family: 'DM Mono', monospace; }
    .compare-val.up   { color: var(--up); }
    .compare-val.down { color: var(--down); }
    .diff-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 12px; border-radius: 99px; font-size: 14px;
      font-weight: 700; font-family: 'DM Mono', monospace; margin-top: 12px;
    }
    .diff-badge.up   { background: #d1fae5; color: var(--up); }
    .diff-badge.down { background: #fee2e2; color: var(--down); }
    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.4); border-top-color: white;
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 50px 20px; color: var(--muted); }
    .empty-state .icon { font-size: 52px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; line-height: 1.6; }
    footer { text-align: center; font-size: 11px; color: var(--muted); padding: 20px; }
  </style>
</head>
<body>

<header>
  <h1>🌾 수확기 산지쌀값 분석</h1>
  <p>통계청 KOSIS 기반 · 수확기 쌀값 · 공공비축 수매가</p>
</header>

<main>
  <div class="btn-wrap">
    <button id="btnAnalyze" onclick="runAnalysis()">
      <span id="btnIcon">📊</span>
      <span id="btnText">최근 수확기(10월-12월) 산지쌀값 분석</span>
    </button>
  </div>
  <div id="status"></div>
  <div id="result"></div>
</main>

<footer>데이터 출처: 통계청 KOSIS 산지쌀값 (DT_1EI10122)</footer>

<script>
  const API_URL = "https://rice-analysis-gppu.onrender.com/analyze";

  async function runAnalysis() {
    const btn = document.getElementById("btnAnalyze");
    const status = document.getElementById("status");
    const result = document.getElementById("result");

    btn.disabled = true;
    document.getElementById("btnIcon").innerHTML = '<span class="spinner"></span>';
    document.getElementById("btnText").textContent = "데이터 불러오는 중...";
    status.textContent = "통계청 KOSIS에서 최신 데이터를 가져오고 있어요...";
    result.innerHTML = "";

    try {
      const res = await fetch(API_URL);
      if (!res.ok) throw new Error("서버 응답 오류: " + res.status);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      status.textContent = `분석 완료 · 원자료 ${data.fetched_rows}행 · 최신 연도 ${data.latest_year}년`;
      result.innerHTML = buildResult(data);
    } catch (e) {
      status.textContent = "오류: " + e.message;
      result.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>${e.message}</p></div>`;
    } finally {
      btn.disabled = false;
      document.getElementById("btnIcon").textContent = "📊";
      document.getElementById("btnText").textContent = "최근 수확기(10월-12월) 산지쌀값 분석";
    }
  }

  function buildResult(data) {
    const latestYear = data.latest_year;
    let html = "";

    html += `<div class="section-title">수확기 쌀값 및 예상 공공비축 수매가</div>`;
    html += `<div class="card"><table class="year-table">
      <thead><tr>
        <th>연도</th><th>수확기 쌀값(80kg, 정곡)</th><th>공공비축 수매가(40kg, 조곡)</th>
      </tr></thead><tbody>`;

    for (const row of data.yearly) {
      const isLatest = row.year === latestYear;
      html += `<tr class="${isLatest ? 'highlight-row' : ''}">
        <td class="year-col">${row.year}</td>
        <td class="price-col">${row.harvest_price_80kg}</td>
        <td class="price-col">${row.public_stock_price_40kg}</td>
      </tr>`;
    }
    html += `</tbody></table></div>`;

    html += `<div class="section-title">수매가 비교분석(40kg)</div>`;

    const c1 = data.compare[0];
    const dir1 = c1.is_up === true ? "up" : c1.is_up === false ? "down" : "";
    const arrow1 = c1.is_up === true ? "▲" : c1.is_up === false ? "▼" : "";
    html += `<div class="compare-card">
      <div class="compare-label">${c1.label}</div>
      <div class="compare-row">
        <span class="compare-key">최근 5년 평균 수매가</span>
        <span class="compare-val">${c1.base}</span>
      </div>
      <div class="compare-row">
        <span class="compare-key">2025년</span>
        <span class="compare-val">${c1.current}</span>
      </div>
      ${c1.diff ? `<div class="diff-badge ${dir1}">${arrow1} ${c1.diff} &nbsp;|&nbsp; ${c1.pct}</div>` : ""}
    </div>`;

    const c2 = data.compare[1];
    const dir2 = c2.is_up === true ? "up" : c2.is_up === false ? "down" : "";
    const arrow2 = c2.is_up === true ? "▲" : c2.is_up === false ? "▼" : "";
    html += `<div class="compare-card">
      <div class="compare-label">${c2.label}</div>
      <div class="compare-row">
        <span class="compare-key">2024년 수매가</span>
        <span class="compare-val">${c2.base}</span>
      </div>
      <div class="compare-row">
        <span class="compare-key">2025년</span>
        <span class="compare-val">${c2.current}</span>
      </div>
      ${c2.diff ? `<div class="diff-badge ${dir2}">${arrow2} ${c2.diff} &nbsp;|&nbsp; ${c2.pct}</div>` : ""}
    </div>`;

    return html;
  }
</script>
</body>
</html>
